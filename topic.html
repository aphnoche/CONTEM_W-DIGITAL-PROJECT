<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic — Human Rights Violations</title>
    <meta name="description" content="Explore this human rights topic through an interactive mind map.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/mindmap.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="body--mindmap">
    <header class="mindmap-nav">
        <a href="index.html" class="mindmap-nav__back" id="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
        <h1 class="mindmap-nav__title" id="mindmap-title"></h1>
        <button class="bgm-toggle" id="bgm-toggle" aria-label="Toggle background music">
            <i class="fa-solid fa-volume-xmark"></i>
        </button>
    </header>

    <div class="mindmap" id="mindmap-container"></div>

    <div class="mindmap-hint" id="mindmap-hint">
        <i class="fa-solid fa-hand-pointer"></i>
        <span class="mindmap-hint__desktop">Click on a node to reveal details</span>
        <span class="mindmap-hint__mobile">Long-press on a node to reveal details</span>
    </div>

    <aside class="flyout" id="flyout">
        <button class="flyout__close" id="flyout-close">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="flyout__scroll-area" id="flyout-scroll-area">
            <div class="flyout__header">
                <div class="flyout__accent" id="flyout-accent"></div>
                <h2 class="flyout__title" id="flyout-title"></h2>
            </div>
            <div class="flyout__content-wrapper">
                <div class="flyout__body" id="flyout-body"></div>
                <div class="flyout__source" id="flyout-source"></div>
            </div>
            <div class="flyout__reflection" id="flyout-reflection">
                <h3 class="flyout__reflection-title">Critical Reflection</h3>
                <div id="flyout-reflection-questions" class="flyout__reflection-questions"></div>
                <button class="flyout__reflection-submit" id="flyout-reflection-submit">Save Thoughts</button>
                <div class="flyout__reflection-feedback" id="flyout-reflection-feedback">Response saved. Thank you for
                    reflecting.</div>
            </div>
        </div>
        <div class="flyout__scroll-indicator" id="flyout-scroll-indicator">
            <i class="fa-solid fa-arrow-down"></i> Scroll for reflection
        </div>
    </aside>

    <div class="flyout-overlay" id="flyout-overlay"></div>

    <script src="data/topics.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="js/mindmap.js"></script>
</body>

</html>
